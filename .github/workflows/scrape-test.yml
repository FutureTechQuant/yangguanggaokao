name: scrape-test

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  schedule:
    - cron: "0 2 * * *"

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Run test
        run: npx playwright test --reporter=html,line

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload captured data
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: scrape-artifacts
          path: artifacts/
          retention-days: 7
